<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="-1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fichas Max - Conectar</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/favicon.png" type="image/x-icon">
</head>

<body>

    $(if chap-id)
    <form name="sendin" action="$(link-login-only)" method="post" style="display:none">
        <input type="hidden" name="username" />
        <input type="hidden" name="password" />
        <input type="hidden" name="dst" value="http://binarsdev.com" />
        <input type="hidden" name="popup" value="true" />
    </form>

    <script src="/md5.js"></script>
    <script>
        function doLogin() {
            document.sendin.username.value = document.login.username.value;
            document.sendin.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
            document.sendin.submit();
            return false;
        }

    </script>
    $(endif)
    <div class="ie-fixMinHeight">
        <div class="main">
            <div class="wrap animated fadeIn">
                <form name="login" action="$(link-login-only)" method="post" $(if chap-id) onSubmit="return doLogin()" $(endif)>
                    <input type="hidden" name="dst" value="http://binarsdev.com" />
                    <input type="hidden" name="popup" value="true" />
                   
                    <div align="center"> <img src="img/logo.png" width="160" id="ffLogo"></div>
                    <div align="center"> <img src="img/nombre.png" width="160"></div>
                    <br>


                    <p class="info $(if error)alert$(endif)">
                        $(if error == "")Inicie sesión para utilizar el servicio $(if trial == 'yes')<br />Prueba gratuita, <a href="$(link-login-only)?dst=$(link-orig-esc)&amp;username=T-$(mac-esc)">click aqui</a>.$(endif)
                        $(endif)

                        $(if error)$(error)$(endif)
                    </p>
                    <label>
                        <img class="ico" src="img/user.svg" alt="#" />
                        <input name="username" type="text" value="$(username)" placeholder="Usuario" />
                    </label>

                    <label>
                        <img class="ico" src="img/password.svg" alt="#" />
                        <input name="password" type="password" placeholder="Contraseña" />
                    </label>

                    <input type="submit" value="Conectar" />

                    <br>

                <!-- </form>
                <div align="center"><a href="tel:9631299183" style="color: #ffffff;">9631710076</a></div> -->

                <br>
                <p class="info bt">Echo por Binarsdev</p>

            </div>
        </div>
    </div>
</body>

</html>
